<div class="container mt-5">

    <h2 class="text-center mb-4">
        Admin Dashboard
    </h2>

    <table class="table table-bordered table-striped">

        <thead>

        <tr>
            <th>ID</th>
            <th>Employee ID</th>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        </thead>

        <tbody>

        <tr *ngFor="let leave of leaves">

            <td>{{leave.id}}</td>
            <td>{{leave.employee.id}}</td>
            <td>{{leave.leaveType}}</td>
            <td>{{leave.startDate}}</td>
            <td>{{leave.endDate}}</td>
            <td>{{leave.reason}}</td>
            <td>{{leave.status}}</td>

            <td>

                <button
                        class="btn btn-success btn-sm me-2"
                        (click)="approve(leave.id)">
                    Approve
                </button>

                <button
                        class="btn btn-danger btn-sm"
                        (click)="reject(leave.id)">
                    Reject
                </button>

            </td>

        </tr>

        </tbody>

    </table>

</div>

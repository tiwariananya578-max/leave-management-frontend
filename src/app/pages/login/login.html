<div class="container mt-5" style="max-width:400px;">
    <h2 class="text-center mb-4">Leave Management System</h2>

    <input
        type="email"
        class="form-control mb-3"
        placeholder="Email"
        [(ngModel)]="email">

    <input
        type="password"
        class="form-control mb-3"
        placeholder="Password"
        [(ngModel)]="password">

    <button class="btn btn-primary w-100" (click)="login()">
        Login
    </button>
</div>
